<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow p-4" style="width: 460px;">
    <h4 class="mb-4 text-center fw-bold">Create Account</h4>

    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">First Name</label>
          <input class="form-control" formControlName="firstName">
        </div>
        <div class="col">
          <label class="form-label">Last Name</label>
          <input class="form-control" formControlName="lastName">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password">
        <small class="text-muted">Min 8 chars, 1 uppercase, 1 digit.</small>
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" formControlName="role">
          <option value="Student">Student</option>
          <option value="Instructor">Instructor</option>
        </select>
      </div>

      <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Create Account
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account? <a routerLink="/auth/login">Login</a>
    </p>
  </div>
</div>
