<div class="container py-5">
  <h2 class="fw-bold mb-4">Browse Courses</h2>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4" *ngIf="!loading">
    <div class="col" *ngFor="let course of courses">
      <div class="card h-100 shadow-sm">
        <img [src]="course.thumbnailUrl || 'assets/default-course.png'"
          class="card-img-top" style="height:180px; object-fit:cover;"
          [alt]="course.title">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ course.title }}</h5>
          <p class="card-text text-muted small">{{ course.description | slice:0:100 }}...</p>
          <div class="text-muted small mb-2">
            👤 {{ course.instructorName }} &nbsp;|&nbsp;
            📚 {{ course.totalModules }} modules &nbsp;|&nbsp;
            🎯 {{ course.totalLessons }} lessons
          </div>
          <div class="mt-auto d-flex justify-content-between align-items-center">
            <span class="fw-bold text-primary fs-5">
              ₹{{ course.price | number:'1.0-0' }}
            </span>
            <div>
              <a [routerLink]="['/courses', course.id]"
                class="btn btn-outline-primary btn-sm me-2">Details</a>
              <button class="btn btn-primary btn-sm"
  *ngIf="isLoggedIn"
  (click)="enroll(course.id)">
  Enroll Free
</button>
              <a routerLink="/auth/login"
                class="btn btn-primary btn-sm"
                *ngIf="!isLoggedIn">
                Login to Enroll
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && courses.length === 0" class="text-center text-muted py-5">
    No courses available yet.
  </div>
</div>
