<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0">Welcome, {{ fullName }} 👋</h2>
      <span class="badge bg-primary">{{ role }}</span>
    </div>
    <a routerLink="/courses" class="btn btn-outline-primary">Browse Courses</a>
  </div>

  <h5 class="mb-3">My Enrollments</h5>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row g-3" *ngIf="!loading">
    <div class="col-md-6" *ngFor="let e of enrollments">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h6 class="fw-bold">{{ e.courseTitle }}</h6>
          <p class="text-muted small mb-2">
            Enrolled: {{ e.enrolledAt | date:'mediumDate' }}
          </p>
          <div class="progress mb-2" style="height:8px;">
            <div class="progress-bar bg-success"
              [style.width.%]="e.progressPercent">
            </div>
          </div>
          <div class="d-flex justify-content-between">
            <small class="text-muted">{{ e.progressPercent }}% complete</small>
            <span class="badge bg-success" *ngIf="e.isCompleted">Completed</span>
            <span class="badge bg-warning text-dark" *ngIf="!e.isCompleted">In Progress</span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="enrollments.length === 0" class="col-12 text-center text-muted py-4">
      You haven't enrolled in any courses yet.
      <a routerLink="/courses" class="d-block mt-2">Browse Courses →</a>
    </div>
  </div>
</div>
