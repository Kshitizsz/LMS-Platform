<nav class="navbar navbar-expand-lg navbar-custom px-4">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2"
      routerLink="/courses">
      <div style="width:34px; height:34px;
        background:linear-gradient(135deg,#5b4fcf,#3d3ab0);
        border-radius:9px; display:flex; align-items:center;
        justify-content:center;">
        <i class="bi bi-mortarboard-fill"
          style="color:white; font-size:16px;"></i>
      </div>
      <span style="font-weight:800; font-size:1.05rem; color:#1a1a2e;">
        LMS <span style="color:#5b4fcf;">Platform</span>
      </span>
    </a>

    <button class="navbar-toggler border-0" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-4 gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/courses"
            routerLinkActive="active">
            Courses
          </a>
        </li>
        <li class="nav-item" *ngIf="isLoggedIn">
          <a class="nav-link" routerLink="/dashboard"
            routerLinkActive="active">
            Dashboard
          </a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <ng-container *ngIf="!isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/auth/login">
              Sign In
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/auth/register"
              style="background:linear-gradient(135deg,#5b4fcf,#3d3ab0);
                color:white; font-weight:600; padding:8px 20px;
                border-radius:8px; text-decoration:none; font-size:0.88rem;">
              Get Started
            </a>
          </li>
        </ng-container>

        <ng-container *ngIf="isLoggedIn">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
              data-bs-toggle="dropdown" style="cursor:pointer;">
              <div style="width:32px; height:32px;
                background:linear-gradient(135deg,#5b4fcf,#3d3ab0);
                border-radius:50%; display:flex; align-items:center;
                justify-content:center; color:white; font-weight:700;
                font-size:13px;">
                {{ fullName.charAt(0) }}
              </div>
              <span style="font-weight:600; font-size:0.9rem; color:#333;">
                {{ fullName }}
              </span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0"
              style="border-radius:12px; min-width:200px; margin-top:8px;">
              <li class="px-3 py-2">
                <div style="font-weight:700; font-size:0.9rem; color:#1a1a2e;">
                  {{ fullName }}
                </div>
                <div style="font-size:0.78rem; color:#999;">{{ role }}</div>
              </li>
              <li><hr class="dropdown-divider my-1"></li>
              <li>
                <a class="dropdown-item py-2" routerLink="/dashboard"
                  style="font-size:0.88rem;">
                  <i class="bi bi-grid me-2"></i>Dashboard
                </a>
              </li>
              <li><hr class="dropdown-divider my-1"></li>
              <li>
                <button class="dropdown-item py-2"
                  style="color:#dc3545; font-size:0.88rem; font-weight:500;"
                  (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i>Sign Out
                </button>
              </li>
            </ul>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
